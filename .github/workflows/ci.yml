name: CI
on:
  push:
    branches: [master]
  pull_request:
jobs:
  go-test:
    name: Run go unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: git checkout
        uses: actions/checkout@v4
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.4'
      - run: go test -v .
      - run: go test -v ./socks/socks5
      - run: go test -v ./utils
  go-build:
    name: Build go package
    needs: ["go-test"]
    runs-on: ubuntu-22.04
    steps:
      - name: git checkout
        uses: actions/checkout@v4
      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.4'
      - name: Build package
        run: go build -o proxyd-bin ./cmd
